# Render Blueprint for Ripple Transit.
# Deploy: New → Blueprint → connect this repo. Render reads this file.
# Secrets (sync: false) must be filled in the Render dashboard after creation.
services:
  - type: web
    name: ripple-transit
    runtime: node
    plan: free
    region: singapore
    # Install devDeps (vite/tailwind needed to build the client), build, then
    # apply DB migrations + seed once at build time (env vars are available here).
    buildCommand: npm ci --include=dev && npm run build && npm run db:migrate && npm run db:seed
    # Start the server directly so it begins listening immediately and the
    # health check passes fast (no per-boot migration delay / restart loop).
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Strong random secret generated by Render for signing session cookies.
      - key: SESSION_SECRET
        generateValue: true
      - key: HERE_MONTHLY_CAP
        value: "29950"
      # ── Secrets: set these in the Render dashboard (Environment tab) ──
      - key: DATABASE_URL # Turso libsql:// URL
        sync: false
      - key: DATABASE_AUTH_TOKEN # Turso auth token
        sync: false
      - key: ONEMAP_TOKEN # OneMap 3-day JWT
        sync: false
      - key: ONEMAP_EMAIL # optional: enables token auto-refresh
        sync: false
      - key: ONEMAP_PASSWORD # optional
        sync: false
      - key: LTA_ACCOUNT_KEY
        sync: false
      - key: HERE_API_KEY
        sync: false
